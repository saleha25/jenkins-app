name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    types:
      - closed

jobs:
  build-test-push:
    if: github.event_name == 'push' || github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/jenkins-app:latest .

      - name: Test container
        run: |
          docker run -d --name test-container -p 8080:80 ${{ secrets.DOCKERHUB_USERNAME }}/jenkins-app:latest
          sleep 5
          docker ps
          docker stop test-container
          docker rm test-container

      - name: Push Docker image
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/jenkins-app:latest

  deploy:
    needs: build-test-push
    if: github.event_name == 'push' || github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Deploy placeholder
        run: echo "Docker Hub push completed. EC2 deployment will be added after secrets are configured."
